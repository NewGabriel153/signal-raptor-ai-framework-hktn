services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydatabase
    volumes:
      - db_data:/var/lib/postgresql/data

  api:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - db

  web:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  db_data: